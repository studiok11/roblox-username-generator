<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roblox Username Generator</title>
<style>
body {
  font-family: Arial;
  text-align: center;
  margin-top: 80px;
  background: #f4f4f4;
}

button {
  padding: 15px 25px;
  font-size: 18px;
  cursor: pointer;
  border: none;
  background: #ff4d4d;
  color: white;
  border-radius: 10px;
}

#result {
  margin-top: 30px;
  font-size: 28px;
  font-weight: bold;
}
</style>
</head>
<body>

<h1>Roblox Username Generator</h1>

<button onclick="generate()">Generate Username</button>

<div id="result"></div>

<script>
const words1 = ["Dark", "Pixel", "Ninja", "Ultra", "Shadow", "Crazy", "Mega", "Pro"];
const words2 = ["Gamer", "Knight", "Hero", "Boss", "King", "Player", "Master", "Hunter"];

function generate() {
  let w1 = words1[Math.floor(Math.random() * words1.length)];
  let w2 = words2[Math.floor(Math.random() * words2.length)];
  document.getElementById("result").innerText = w1 + w2;
}
</script>

</body>
</html>
