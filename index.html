<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Free Roblox Username Generator by country.">
    <meta name="keywords" content="roblox username generator, country-based usernames, cool roblox names">
    <title>Roblox Username Generator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 80px;
            background: url('https://images.openai.com/static-rsc-4/1pbo8T-7jfs4EXMzKLDBdwj3Z96XRG7J8OOh2ATjT78zSUDWzUHP8XQWvlTwtcqkSt_MOEo_qgxgiPZWAlMRxsaFAzRTy0311dVt44Ao-3OgydgB4dtaX6q828hTAkWX_O_NsP4HvOVhSLFfcbigRjPKFGyHyNY6nTBOiKmOlVmc6gWVA8gPcXau0_3Y4tyo?purpose=fullsize') no-repeat center center fixed;
            background-size: cover;
        }
        button {
            padding: 15px 25px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            background: #ff4d4d;
            color: white;
            border-radius: 10px;
        }
        #result {
            margin-top: 30px;
            font-size: 28px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Roblox Username Generator</h1>
    <label for="country">Choose a country:</label>
    <select id="country" onchange="updateWords()">
        <option value="">--Select Country--</option>
        <option value="us">USA</option>
        <option value="uk">UK</option>
        <option value="japan">Japan</option>
    </select>
    <button onclick="generate()">Generate Username</button>
    <div id="result"></div>

    <script>
        const words = {
            us: ["Star", "Rocket", "Hero", "Galaxy", "Player", "Pro"],
            uk: ["Knight", "Royal", "Wizard", "Magic", "Champion", "Explorer"],
            japan: ["Samurai", "Ninja", "Shogun", "Sakura", "Dragon", "Knight"]
        };

        function updateWords() {
            // Δεν χρειάζεται αλλαγή εδώ, απλά θα διαβάσουμε το dropdown στο generate.
        }

        function generate() {
            const country = document.getElementById('country').value;
            if (!country || !words[country]) {
                document.getElementById("result").innerText = "Please select a country.";
                return;
            }
            const wordList = words[country];
            let w1 = wordList[Math.floor(Math.random() * wordList.length)];
            let w2 = wordList[Math.floor(Math.random() * wordList.length)];
            document.getElementById("result").innerText = w1 + w2;
        }
    </script>
</body>
